name: Deploy Cloud Functions

on:
  workflow_call:
    inputs:
      function_name:
        description: 'Cloud Functionの名前'
        required: true
        type: string
      service_account_name:
        description: 'サービスアカウント名（例: my-sa-name）'
        required: true
        type: string
      # from
      # project_id:
      #   description: '関数をデプロイするGoogle CloudプロジェクトID'
      #   required: true
      #   type: string
      # region:
      #   description: '関数を配置するGoogle Cloudリージョン'
      #   required: true
      #   type: string
      # gcp_project_number:
      #   description: 'Google Cloudプロジェクト番号（Workload Identity用）'
      #   required: true
      #   type: string
      # secrets_project_id:
      #   description: 'シークレットが格納されているGoogle CloudプロジェクトID（未設定時はfunctionのproject_idを使用）'
      #   required: false
      #   type: string
      # to
      wip_pool_name:
        description: 'Workload Identityプール名'
        required: false
        type: string
        default: 'github-actions-pool'
      wip_provider_name:
        description: 'Workload Identityプロバイダー名'
        required: false
        type: string
        default: 'github-provider'
      secrets_config:
        description: 'シークレット名の複数行文字列（例: "SECRET_A\nSECRET_B"）'
        required: true
        type: string
      runtime:
        description: 'Cloud Functionのランタイム（例: php82）'
        required: false
        type: string
        default: 'php82'
      source_dir:
        description: '関数コードのソースディレクトリ'
        required: false
        type: string
        default: './'
      http_max_instance_count:
        description: 'HTTPトリガー関数の最大インスタンス数'
        required: false
        type: number
        default: 1
      memory:
        description: '関数に割り当てるメモリ量'
        required: false
        type: string
        default: '256M'
      http_timeout:
        description: 'HTTPトリガー関数のタイムアウト時間'
        required: false
        type: string
        default: '60s'
      event_timeout:
        description: 'イベントトリガー関数のタイムアウト時間'
        required: false
        type: string
        default: '5m'
      gcs_source_dir:
        description: 'Cloud Storageへのコピー元ディレクトリ'
        required: false
        type: string
        default: ''
      gcs_bucket_name:
        description: 'Cloud Storageのコピー先バケット名'
        required: false
        type: string
        default: ''
      gcs_bucket_path:
        description: 'Cloud Storageのコピー先パス'
        required: false
        type: string
        default: ''
      disable_gcs_cache:
        description: 'Cloud Storageでのキャッシュを無効化するかどうか'
        required: false
        type: boolean
        default: false
      deploy_http_trigger:
        description: 'HTTPトリガー関数をデプロイするかどうか'
        required: false
        type: boolean
        default: true
      http_entry_point:
        description: 'HTTPトリガー関数のエントリポイント'
        required: false
        type: string
        default: 'main_http'
      deploy_event_trigger:
        description: 'イベントトリガー関数をデプロイするかどうか'
        required: false
        type: boolean
        default: true
      event_entry_point:
        description: 'イベントトリガー関数のエントリポイント'
        required: false
        type: string
        default: 'main_event'
      event_trigger_pubsub_topic_suffix:
        description: 'イベントトリガーPub/Subトピックのサフィックス（function_nameに付加されます）'
        required: false
        type: string
        default: '-event'
      environment_variables:
        description: '環境変数を KEY=VALUE,KEY2=VALUE2 の形式で渡します'
        required: false
        type: string
        default: ''
    secrets:
    #   GCP_PROJECT_ID:
    #     description: 'Google CloudプロジェクトID'
    #     required: true
      GCP_REGION:
        description: 'Google Cloudリージョン'
        required: true
      GCP_PROJECT_NUMBER:
        description: 'Google Cloudプロジェクト番号'
        required: true

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  init:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      formatted_secrets: ${{ steps.format-secrets.outputs.formatted_secrets }}
    steps:
      - name: Google Cloud認証
        id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ inputs.wip_pool_name }}/providers/${{ inputs.wip_provider_name }}'
          service_account: '${{ inputs.service_account_name }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      # - name: Prepare Secrets Configuration
      #   id: format-secrets
      #   uses: actions/github-script@v8
      #   env:
      #     SECRETS_CONFIG: ${{ inputs.secrets_config }}
      #     PROJECT_ID: ${{ inputs.project_id }}
      #   with:
      #     script: |
      #       core.startGroup('Preparing secrets configuration');
      #       const { SECRETS_CONFIG, PROJECT_ID } = process.env;
      #       const secrets = SECRETS_CONFIG.split(/\r?\n/).filter(line => line.trim() !== '');
      #       const formatted = secrets.map(name => {
      #         const trimmed = name.trim();
      #         console.log(`Adding secret: ${trimmed}`);
      #         return `${trimmed}=projects/${PROJECT_ID}/secrets/${trimmed}/versions/latest`;
      #       }).join(',');
      #       core.setOutput('formatted_secrets', formatted);
      #       core.endGroup();

  # 2. 文字列の整形：Project ID を動的に埋め込む
      - name: Prepare Secrets Configuration
        id: format-secrets
        run: |
          # 認証ステップから Project ID を取得
          PROJECT_ID="${{ steps.auth.outputs.project_id }}"
          
          echo "Processing secrets for project: ${PROJECT_ID}"

          # 入力の改行区切りテキストを読み込む
          SECRETS_INPUT="${{ inputs.secrets_config }}"
          FORMATTED_LIST=""

          for KEY in $SECRETS_INPUT; do
            if [ -n "$KEY" ]; then
              # 「KEY=projects/ID/secrets/KEY:latest」の形を作る
              ITEM="${KEY}=projects/${PROJECT_ID}/secrets/${KEY}:latest"
              echo "Formatted secret: ${ITEM}"
              
              if [ -z "$FORMATTED_LIST" ]; then
                FORMATTED_LIST="$ITEM"
              else
                FORMATTED_LIST="${FORMATTED_LIST},${ITEM}"
              fi
            fi
          done

          # 結果をセット（例: KEY1=path1,KEY2=path2...）
          echo "secrets_list=${FORMATTED_LIST}" >> $GITHUB_OUTPUT
          
  upload-static:
    name: Upload Static Files to GCS
    if: inputs.gcs_source_dir != '' && inputs.gcs_bucket_name != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Google Cloud認証
        id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ inputs.wip_pool_name }}/providers/${{ inputs.wip_provider_name }}'
          service_account: '${{ inputs.service_account_name }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Mirror local directory to GCS
        uses: 'google-github-actions/upload-cloud-storage@v2'
        with:
          path: ${{ inputs.gcs_source_dir }}
          parent: false
          destination: '${{ inputs.gcs_bucket_name }}/${{ inputs.gcs_bucket_path }}'

      - name: 'Update Cache-Control metadata for static files'
        if: inputs.disable_gcs_cache
        shell: bash
        run: |
          gcloud storage objects update gs://${{ inputs.gcs_bucket_name }}/${{ inputs.gcs_bucket_path }}**/* --cache-control="no-cache,no-store,must-revalidate"

  deploy-http:
    name: Deploy HTTP Function
    needs: init
    if: inputs.deploy_http_trigger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Google Cloud認証
        id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ inputs.wip_pool_name }}/providers/${{ inputs.wip_provider_name }}'
          service_account: '${{ inputs.service_account_name }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: 'Deployment Configuration Summary'
        shell: bash
        run: |
          echo "::group::Deployment Configuration (HTTP)"
          echo "Function Name: ${{ inputs.function_name }}"
          echo "Project ID: ${{ secrets.GCP_PROJECT_ID }}"
          echo "Region: ${{ secrets.GCP_REGION }}"
          echo "Runtime: ${{ inputs.runtime }}"
          echo "Entry Point: ${{ inputs.http_entry_point }}"
          echo "Max Instances: ${{ inputs.http_max_instance_count }}"
          echo "Timeout: ${{ inputs.http_timeout }}"
          echo "Memory: ${{ inputs.memory }}"
          echo "Secrets: ${{ needs.init.outputs.formatted_secrets }}"
          echo "::endgroup::"

      - name: Deploy Cloud Functions (http)
        uses: 'google-github-actions/deploy-cloud-functions@v4'
        with:
          name: ${{ inputs.function_name }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          region: ${{ secrets.GCP_REGION }}
          runtime: ${{ inputs.runtime }}
          entry_point: ${{ inputs.http_entry_point }}
          service_account: '${{ inputs.service_account_name }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
          source_dir: ${{ inputs.source_dir }}
          max_instance_count: ${{ inputs.http_max_instance_count }}
          memory: ${{ inputs.memory }}
          service_timeout: ${{ inputs.http_timeout }}
          secrets: ${{ needs.init.outputs.formatted_secrets }}
          environment_variables: |-
           ${{ inputs.environment_variables }}

      - name: 'Allow Public Access to HTTP Function'
        if: contains(inputs.environment_variables, 'APP_ENV=test')
        shell: bash
        run: |
          # Cloud Functionsとしての権限付与
          gcloud functions add-iam-policy-binding ${{ inputs.function_name }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION }} \
            --member="allUsers" \
            --role="roles/cloudfunctions.invoker"

          # 裏側の Cloud Run に対しても権限付与（第2世代の場合に必要）
          gcloud run services add-iam-policy-binding ${{ inputs.function_name }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker"

  deploy-event:
    name: Deploy Event Function
    needs: init
    if: inputs.deploy_event_trigger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Google Cloud認証
        id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ inputs.wip_pool_name }}/providers/${{ inputs.wip_provider_name }}'
          service_account: '${{ inputs.service_account_name }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: 'Deployment Configuration Summary'
        shell: bash
        run: |
          echo "::group::Deployment Configuration (Event)"
          echo "Function Name: ${{ inputs.function_name }}${{ inputs.event_trigger_pubsub_topic_suffix }}"
          echo "Project ID: ${{ secrets.GCP_PROJECT_ID }}"
          echo "Region: ${{ secrets.GCP_REGION }}"
          echo "Runtime: ${{ inputs.runtime }}"
          echo "Entry Point: ${{ inputs.event_entry_point }}"
          echo "Timeout: ${{ inputs.event_timeout }}"
          echo "Pub/Sub Topic: projects/${{ secrets.GCP_PROJECT_ID }}/topics/${{ inputs.function_name }}${{ inputs.event_trigger_pubsub_topic_suffix }}"
          echo "Memory: ${{ inputs.memory }}"
          echo "::endgroup::"

      - name: Deploy Cloud Functions (event)
        uses: 'google-github-actions/deploy-cloud-functions@v4'
        with:
          name: ${{ inputs.function_name }}${{ inputs.event_trigger_pubsub_topic_suffix }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          region: ${{ secrets.GCP_REGION }}
          runtime: ${{ inputs.runtime }}
          entry_point: ${{ inputs.event_entry_point }}
          event_trigger_type: google.cloud.pubsub.topic.v1.messagePublished
          event_trigger_pubsub_topic: projects/${{ secrets.GCP_PROJECT_ID }}/topics/${{ inputs.function_name }}${{ inputs.event_trigger_pubsub_topic_suffix }}
          service_account: '${{ inputs.service_account_name }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
          source_dir: ${{ inputs.source_dir }}
          max_instance_count: 1
          memory: ${{ inputs.memory }}
          service_timeout: ${{ inputs.event_timeout }}
          secrets: ${{ needs.init.outputs.formatted_secrets }}
          environment_variables: |-
           ${{ inputs.environment_variables }}
